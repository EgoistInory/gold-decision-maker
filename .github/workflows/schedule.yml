name: Gold Price Monitor Schedule

on:
  schedule:
    # 每天 09:30, 14:30 运行一次 (UTC时间，请根据需要调整)
    - cron: '30 1,6 * * *'
  workflow_dispatch: # 支持手动触发测试

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run decision maker
        run: python main.py
        # 如果需要注入 Secret Webhook，可以使用环境变量:
        # env:
        #   DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

name: Gold Price Monitor Schedule

on:
  schedule:
    # 交易日(周一至周五)交易时间段内每小时触发一次 (北京时间 09:00-15:00, 20:00-02:00)
    # 对应 UTC: 01:00-07:00, 12:00-18:00
    - cron: '0 1-7,12-18 * * 1-5'
  workflow_dispatch: # 支持手动触发测试

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run decision maker
        run: python main.py
        # 如果需要注入 Secret Webhook，可以使用环境变量:
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          SERVERCHAN_SEND_KEY: ${{ secrets.SERVERCHAN_SEND_KEY }}
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          

